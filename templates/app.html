<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safecure AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background - list-style none fixes the bullet points bug */
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .circles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; list-style: none; padding: 0; margin: 0; }
        .circles li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px;
            background: rgba(255,255,255,0.1);
            animation: animateCircle 25s linear infinite;
            bottom: -150px; border-radius: 50%;
        }
        @keyframes animateCircle {
            0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }
        .circles li:nth-child(1)  { left:25%; width:80px;  height:80px;  animation-delay:0s; }
        .circles li:nth-child(2)  { left:10%; width:20px;  height:20px;  animation-delay:2s;  animation-duration:12s; }
        .circles li:nth-child(3)  { left:70%; width:20px;  height:20px;  animation-delay:4s; }
        .circles li:nth-child(4)  { left:40%; width:60px;  height:60px;  animation-delay:0s;  animation-duration:18s; }
        .circles li:nth-child(5)  { left:65%; width:20px;  height:20px;  animation-delay:0s; }
        .circles li:nth-child(6)  { left:75%; width:110px; height:110px; animation-delay:3s; }
        .circles li:nth-child(7)  { left:35%; width:150px; height:150px; animation-delay:7s; }
        .circles li:nth-child(8)  { left:50%; width:25px;  height:25px;  animation-delay:15s; animation-duration:45s; }
        .circles li:nth-child(9)  { left:20%; width:15px;  height:15px;  animation-delay:2s;  animation-duration:35s; }
        .circles li:nth-child(10) { left:85%; width:150px; height:150px; animation-delay:0s;  animation-duration:11s; }

        .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }

        .glass-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
        }
        @keyframes slideIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px; text-align: center;
            position: relative; overflow: hidden;
        }
        .header::before {
            content: ''; position: absolute; top:-50%; left:-50%;
            width:200%; height:200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
        .logo { position: relative; z-index: 1; }
        .logo i { font-size: 55px; color: white; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
        .header h1 { color:white; font-size:2.4rem; margin-top:8px; font-weight:800; }
        .header p  { color:rgba(255,255,255,0.9); margin-top:6px; font-size:0.95rem; }

        .form-area { padding: 35px 40px 20px; }
        .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .input-group { margin-bottom: 20px; }

        label {
            display: flex; align-items: center; gap: 8px;
            font-weight: 600; color: #333;
            margin-bottom: 8px; font-size: 0.9rem;
        }
        label i { color: #667eea; font-size: 1.1rem; }

        textarea, input {
            width: 100%; padding: 11px 14px;
            border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 0.95rem; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease; background: #fafafa; color: #333;
        }
        textarea:focus, input:focus {
            outline: none; border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12); background: white;
        }

        .analyze-btn {
            width: 100%; padding: 15px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 50px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer;
            position: relative; overflow: hidden;
            transition: all 0.3s ease; margin-top: 8px;
            animation: glowPulse 2s infinite;
        }
        @keyframes glowPulse {
            0%,100%{box-shadow:0 0 5px rgba(102,126,234,0.3),0 0 10px rgba(102,126,234,0.2);}
            50%    {box-shadow:0 0 20px rgba(102,126,234,0.6),0 0 30px rgba(102,126,234,0.4);}
        }
        .analyze-btn:hover { transform:translateY(-2px); box-shadow:0 0 30px rgba(102,126,234,0.8); animation:none; }
        .analyze-btn:active { transform:translateY(1px); }
        .btn-content { display:flex; align-items:center; justify-content:center; gap:10px; }
        .btn-content i { font-size:1.2rem; }

        .db-btn {
            width:100%; padding:12px 24px;
            background:rgba(102,126,234,0.08);
            color:#667eea; border:2px solid #667eea;
            border-radius:50px; font-size:0.95rem; font-weight:600;
            cursor:pointer; margin-top:10px;
            transition:all 0.3s ease; font-family:'Inter',sans-serif;
        }
        .db-btn:hover { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; transform:translateY(-2px); box-shadow:0 8px 20px rgba(102,126,234,0.4); }

        /* Processing Overlay */
        .processing-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);
            z-index:1000; display:none; justify-content:center; align-items:center;
        }
        .processing-card { background:white; border-radius:20px; padding:40px; text-align:center; max-width:380px; width:90%; }
        .spinner { width:70px; height:70px; margin:0 auto 20px; position:relative; }
        .double-bounce1, .double-bounce2 {
            width:100%; height:100%; border-radius:50%;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            opacity:0.6; position:absolute; top:0; left:0;
            animation:sk-bounce 2s infinite ease-in-out;
        }
        .double-bounce2 { animation-delay:-1s; }
        @keyframes sk-bounce { 0%,100%{transform:scale(0);} 50%{transform:scale(1);} }
        .processing-steps { margin-top:20px; }
        .step {
            display:flex; align-items:center; gap:10px;
            margin:12px 0; padding:10px 14px;
            background:#f5f5f5; border-radius:10px;
            opacity:0.5; transform:translateX(-10px);
            transition:all 0.5s ease;
        }
        .step.active { opacity:1; transform:translateX(0); background:#f0f4ff; }
        .step i { color:#667eea; font-size:1.1rem; }

        /* Output Area */
        .output-area { padding:0 40px 40px; }

        .patient-id-badge {
            display:inline-block;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; padding:5px 14px; border-radius:20px;
            font-size:0.8rem; font-weight:600; margin-bottom:18px; letter-spacing:1px;
        }

        .result-card {
            background:#f8f9fa; border-radius:15px; padding:20px;
            margin-bottom:14px; border-left:4px solid #667eea;
            transition:all 0.3s ease;
            animation:cardSlide 0.4s ease-out both;
        }
        @keyframes cardSlide { from{opacity:0;transform:translateX(-15px);} to{opacity:1;transform:translateX(0);} }
        .result-card:hover { transform:translateX(4px); box-shadow:0 4px 18px rgba(0,0,0,0.09); }
        .result-card h4 { color:#555; margin-bottom:12px; display:flex; align-items:center; gap:9px; font-size:0.88rem; text-transform:uppercase; letter-spacing:0.5px; }

        .critical-banner {
            background:#fff0f0; border:2px solid #e74c3c;
            border-radius:12px; padding:16px 20px; margin-bottom:14px;
            display:flex; align-items:flex-start; gap:12px;
            animation:cardSlide 0.4s ease-out both;
        }
        .critical-banner i { color:#e74c3c; font-size:1.4rem; flex-shrink:0; margin-top:2px; }
        .critical-banner h4 { color:#c0392b; font-size:1rem; margin-bottom:5px; }
        .critical-banner p  { color:#c0392b; font-size:0.88rem; line-height:1.5; }

        .info-request-banner {
            background:#fffbf0; border:2px solid #f39c12;
            border-radius:12px; padding:16px 20px; margin-bottom:14px;
            animation:cardSlide 0.4s ease-out both;
        }
        .info-request-banner h4 { color:#e67e22; margin-bottom:10px; display:flex; align-items:center; gap:8px; font-size:0.88rem; text-transform:uppercase; }

        .drug-item {
            display:flex; align-items:flex-start; gap:10px;
            padding:8px 0; border-bottom:1px solid #efefef;
        }
        .drug-item:last-child { border-bottom:none; }
        .drug-item i { font-size:0.9rem; margin-top:3px; flex-shrink:0; }
        .drug-item span { color:#333; line-height:1.55; font-size:0.9rem; }

        @media (max-width:640px) {
            .form-area, .output-area { padding:20px; }
            .form-row { grid-template-columns:1fr; }
            .header h1 { font-size:1.8rem; }
        }
    </style>
</head>
<body>

<div class="animated-bg">
    <ul class="circles">
        <li></li><li></li><li></li><li></li><li></li>
        <li></li><li></li><li></li><li></li><li></li>
    </ul>
</div>

<div class="container">
    <div class="glass-card">

        <div class="header">
            <div class="logo">
                <i class="bi bi-heart-pulse-fill"></i>
                <h1>Safecure AI</h1>
                <p>Neural Clinical Intelligence Platform</p>
            </div>
        </div>

        <div class="form-area">

            <div class="input-group">
                <label><i class="bi bi-activity"></i> Symptoms / Condition</label>
                <textarea id="condition" rows="4" placeholder="Describe all symptoms in detail — e.g. High fever since 3 days, severe headache, body aches, joint pain, rash on chest..."></textarea>
            </div>

            <div class="input-group">
                <label><i class="bi bi-shield-exclamation"></i> Allergies</label>
                <input id="allergies" placeholder="e.g. Penicillin, Sulfa (or None)">
            </div>

            <div class="input-group">
                <label><i class="bi bi-capsule"></i> Current Medications</label>
                <input id="medications" placeholder="e.g. Metformin 500mg, Lisinopril 10mg (or None)">
            </div>

            <button class="analyze-btn" onclick="analyzeCase()">
                <div class="btn-content">
                    <i class="bi bi-cpu-fill"></i>
                    <span>Analyze Clinical Case</span>
                    <i class="bi bi-arrow-right-circle-fill"></i>
                </div>
            </button>

            <button class="db-btn" onclick="window.open('/database','_blank')">
                <div class="btn-content">
                    <i class="bi bi-database-fill"></i>
                    <span>View Patient Database</span>
                    <i class="bi bi-arrow-up-right-square"></i>
                </div>
            </button>

        </div>

        <div id="output" class="output-area"></div>
    </div>
</div>

<!-- Processing Overlay -->
<div id="processingOverlay" class="processing-overlay">
    <div class="processing-card">
        <div class="spinner">
            <div class="double-bounce1"></div>
            <div class="double-bounce2"></div>
        </div>
        <h3 style="color:#333; font-size:1.05rem;">Clinical Analysis in Progress</h3>
        <div class="processing-steps">
            <div class="step" id="step1"><i class="bi bi-database"></i><span>Retrieving medical guidelines...</span></div>
            <div class="step" id="step2"><i class="bi bi-shield-check"></i><span>Checking allergies & interactions...</span></div>
            <div class="step" id="step3"><i class="bi bi-robot"></i><span>Generating clinical recommendations...</span></div>
        </div>
    </div>
</div>

<script>
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function drugList(items, iconClass, iconColor, emptyText) {
        if (!items || !items.length)
            return `<p style="color:#aaa;font-style:italic;font-size:0.88rem;">${emptyText}</p>`;
        return items.map(item => `
            <div class="drug-item">
                <i class="${iconClass}" style="color:${iconColor};"></i>
                <span>${escapeHtml(item)}</span>
            </div>`).join('');
    }

    function buildOutput(data) {
        const assessment = data.clinical_assessment        || [];
        const abxRaw     = (data.antibiotic_necessity     || "").trim();
        const firstLine  = data.first_line_therapy         || [];
        const secondLine = data.second_line_alternatives   || [];
        const contras    = data.contraindications          || [];
        const tests      = data.recommended_tests          || [];
        const moreInfo   = data.additional_info_needed     || [];
        const patientId  = data.patient_id                 || "";

        const critical  = assessment.some(a => a.toUpperCase().includes("CRITICAL"));
        const abxNeeded = abxRaw.toUpperCase().startsWith("YES");
        const abxReason = abxRaw.replace(/^(YES|NO)\s*[—\-]?\s*/i, '').trim();
        const meaningfulInfo = moreInfo.filter(i =>
            !i.toLowerCase().includes("none") && !i.toLowerCase().includes("sufficient"));

        let html = '';

        // Patient ID badge
        if (patientId) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
            const timeStr = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
            html += `<div style="text-align:center;margin-bottom:16px;">
                       <span class="patient-id-badge">🆔 Patient ID: ${patientId} &nbsp;·&nbsp; ${dateStr} ${timeStr}</span>
                     </div>`;
        }

        // Critical Emergency Banner
        if (critical) {
            html += `<div class="critical-banner">
                       <i class="bi bi-exclamation-octagon-fill"></i>
                       <div>
                         <h4>⚠️ CRITICAL — URGENT HOSPITAL REFERRAL REQUIRED</h4>
                         <p>This case requires immediate emergency medical attention. Please go to the nearest hospital emergency department without delay.</p>
                       </div>
                     </div>`;
        }

        // Clinical Assessment → Possible Diseases
        html += `<div class="result-card" style="border-left-color:#667eea;">
                   <h4><i class="bi bi-clipboard-pulse" style="color:#667eea;"></i> Possible Diseases</h4>
                   ${assessment.length
                     ? assessment.map(l =>
                         `<div class="drug-item">
                            <i class="bi bi-dot" style="color:#667eea;font-size:1.3rem;"></i>
                            <span style="font-weight:500;">${escapeHtml(l)}</span>
                          </div>`).join('')
                     : '<p style="color:#aaa;font-style:italic;font-size:0.88rem;">No assessment available.</p>'
                   }
                 </div>`;

        // First-Line Therapy
        html += `<div class="result-card" style="border-left-color:#28a745;">
                   <h4><i class="bi bi-star-fill" style="color:#28a745;"></i> First-Line Therapy
                     <span style="font-size:0.72rem;font-weight:400;color:#999;">(Safest First)</span>
                   </h4>
                   ${drugList(firstLine,'bi bi-check-circle-fill','#28a745','Supportive care: Paracetamol, ORS, Rest')}
                 </div>`;

        // Second-Line
        html += `<div class="result-card" style="border-left-color:#ffc107;">
                   <h4><i class="bi bi-arrow-repeat" style="color:#ffc107;"></i> Second-Line Alternatives</h4>
                   ${drugList(secondLine,'bi bi-arrow-right-circle','#ffc107','Not required')}
                 </div>`;

        // Contraindications
        html += `<div class="result-card" style="border-left-color:#dc3545;">
                   <h4><i class="bi bi-exclamation-triangle-fill" style="color:#dc3545;"></i> Contraindications & Precautions</h4>
                   ${drugList(contras,'bi bi-x-circle-fill','#dc3545','None based on provided information')}
                 </div>`;

        // Recommended Tests
        html += `<div class="result-card" style="border-left-color:#17a2b8;">
                   <h4><i class="bi bi-clipboard2-pulse-fill" style="color:#17a2b8;"></i> Recommended Tests</h4>
                   ${drugList(tests,'bi bi-eyedropper','#17a2b8','Routine monitoring only')}
                 </div>`;

        // Disclaimer
        html += `<div class="result-card" style="border-left-color:#adb5bd;background:#fafafa;">
                   <h4><i class="bi bi-shield-lock-fill" style="color:#adb5bd;"></i> Clinical Disclaimer</h4>
                   <p style="font-size:0.82rem;color:#999;line-height:1.6;">⚠️ This AI-generated recommendation is for clinical decision support only. It must be verified by a licensed healthcare professional before administration. Always consider patient-specific factors, local resistance patterns, and clinical judgment.</p>
                 </div>`;

        return html;
    }

    function animateSteps() {
        const ids = ['step1','step2','step3'];
        let i = 0;
        const iv = setInterval(() => {
            if (i < ids.length) { document.getElementById(ids[i]).classList.add('active'); i++; }
            else clearInterval(iv);
        }, 1200);
        return iv;
    }

    async function analyzeCase() {
        const condition   = document.getElementById('condition').value.trim();
        const allergies   = document.getElementById('allergies').value.trim();
        const medications = document.getElementById('medications').value.trim();
        const output      = document.getElementById('output');

        if (!condition) {
            output.innerHTML = `<div class="result-card" style="border-left-color:#dc3545;">
                <h4><i class="bi bi-exclamation-circle" style="color:#dc3545;"></i> Missing Information</h4>
                <p style="color:#666;">Please enter the patient's symptoms or condition to proceed.</p></div>`;
            return;
        }

        const overlay = document.getElementById('processingOverlay');
        overlay.style.display = 'flex';
        ['step1','step2','step3'].forEach(id => document.getElementById(id).classList.remove('active'));
        const animIv = animateSteps();

        try {
            const resp = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    condition:   condition,
                    allergies:   allergies   || "None reported",
                    medications: medications || "None reported"
                })
            });

            clearInterval(animIv);
            overlay.style.display = 'none';

            if (!resp.ok) throw new Error(`Server error: ${resp.status}`);

            const data = await resp.json();

            if (data.status === 'error') {
                output.innerHTML = `<div class="result-card" style="border-left-color:#dc3545;">
                    <h4><i class="bi bi-bug" style="color:#dc3545;"></i> Server Error</h4>
                    <p>${escapeHtml(data.message || 'Unknown error occurred.')}</p></div>`;
                return;
            }

            output.innerHTML = buildOutput(data);
            output.scrollIntoView({ behavior:'smooth', block:'start' });

        } catch (error) {
            clearInterval(animIv);
            overlay.style.display = 'none';
            output.innerHTML = `<div class="result-card" style="border-left-color:#dc3545;">
                <h4><i class="bi bi-wifi-off" style="color:#dc3545;"></i> Connection Error</h4>
                <p style="color:#666;">Failed to connect to the AI engine. Please ensure the backend server is running.</p>
                <details style="margin-top:8px;"><summary style="cursor:pointer;color:#999;font-size:0.83rem;">Error details</summary>
                <code style="font-size:0.78rem;color:#dc3545;">${escapeHtml(error.message)}</code></details></div>`;
        }
    }

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); analyzeCase(); }
    });
</script>

</body>
</html>
