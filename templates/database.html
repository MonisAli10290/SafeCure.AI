<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
font-family:'Inter';
background:#0b0f19;
color:#fff;
}

/* SIDEBAR SAME */
.sidebar{
position:fixed;width:240px;height:100%;
background:#0f1425;padding:20px;
border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:1.6rem;
font-weight:800;
background:linear-gradient(90deg,#00f5ff,#6a5cff);
-webkit-background-clip:text;color:transparent;
margin-bottom:20px;
}

.nav a{
display:block;padding:10px;border-radius:10px;
color:#c9d1d9;text-decoration:none;margin-bottom:6px;
}

.nav a:hover{background:rgba(0,255,255,.1)}

.main{
margin-left:240px;padding:30px;
}

/* TABLE */
.table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

thead{
background:linear-gradient(135deg,#00f5ff,#6a5cff);
}

tr:hover{
background:rgba(255,255,255,0.05);
}

.badge{
padding:4px 10px;border-radius:20px;font-size:.75rem;
}

.red{background:#ff4d6d}
.green{background:#00ff9c;color:#000}

input{
width:100%;padding:10px;border-radius:10px;
background:#111827;border:1px solid #1f2937;color:#fff;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">Safecure AI</div>
<div class="nav">
<a href="/"><i class="bi bi-cpu"></i> Analysis</a>
<a href="#"><i class="bi bi-database"></i> Database</a>
</div>
</div>

<div class="main">

<h2>Patient Database</h2>

<input type="text" id="searchInput" placeholder="Search..." oninput="filterTable()">

<table class="table" id="patientsTable">
<thead>
<tr>
<th>ID</th>
<th>Time</th>
<th>Symptoms</th>
<th>Diagnosis</th>
<th>Antibiotic</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script>
let allPatients=[];

async function loadPatients(){
const res=await fetch('/patients');
const data=await res.json();
allPatients=data.patients;
renderTable(allPatients);
}

function renderTable(patients){
const tbody=document.getElementById('tableBody');
tbody.innerHTML='';
patients.forEach(p=>{
const row=document.createElement('tr');
row.innerHTML=`
<td>${p.id}</td>
<td>${p.timestamp}</td>
<td>${p.condition}</td>
<td>${p.assessment}</td>
<td><span class="badge ${p.antibiotic_necessity.includes('YES')?'red':'green'}">${p.antibiotic_necessity}</span></td>
`;
tbody.appendChild(row);
});
}

function filterTable(){
const val=document.getElementById('searchInput').value.toLowerCase();
renderTable(allPatients.filter(p=>
(p.id||'').toLowerCase().includes(val)||
(p.condition||'').toLowerCase().includes(val)
));
}

loadPatients();
</script>

</body>
</html>
